<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTransit | Control Center</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.05), transparent 25%);
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.85rem; color: var(--text-secondary); }

        .header-controls { display: flex; align-items: center; gap: 20px; }

        .system-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            text-transform: uppercase;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            box-shadow: 0 0 10px var(--text-secondary);
        }

        .status-dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse-green 2s infinite;
        }

        .status-dot.offline {
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Layout */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 73px);
            padding: 20px;
            gap: 20px;
        }

        /* Left Sidebar: Metrics & Control */
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: 100%;
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Metric Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metric-value.cyan { background: linear-gradient(to right, #22d3ee, #0ea5e9); -webkit-background-clip: text; }
        .metric-value.orange { background: linear-gradient(to right, #fbd38d, #f6ad55); -webkit-background-clip: text; }

        /* Chart Container */
        .chart-container {
            padding: 16px;
            height: 220px;
        }

        /* Lists */
        .panel {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-header {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .list-item:hover { background: rgba(255, 255, 255, 0.08); }

        .item-main { display: flex; flex-direction: column; gap: 4px; }
        .item-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent-cyan); }
        .item-sub { font-size: 0.75rem; color: var(--text-secondary); }
        
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
        }
        .badge.taxi { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .badge.combi { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }

        /* Server Connection */
        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-blue); }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #2563eb; }
        button:active { transform: scale(0.98); }
        
        button.danger { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.5); }
        button.danger:hover { background: rgba(239, 68, 68, 0.3); }

        /* Main Map Area */
        .map-section {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #map { width: 100%; height: 100%; background-color: #000; }

        .map-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Map Markers */
        .custom-marker {
            display: grid;
            place-items: center;
        }
        .marker-core {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.4);
            transition: transform 0.2s;
        }
        .marker-core.taxi { box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.4); }
        .marker-core.passenger { background: var(--accent-green); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.3); width: 10px; height: 10px; }
        .custom-marker:hover .marker-core { transform: scale(1.3); }

        /* Terminal Log */
        .terminal {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            height: 140px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .term-time { color: #4b5563; margin-right: 8px; }
        .term-info { color: var(--accent-cyan); }
        .term-warn { color: var(--accent-orange); }
        .term-success { color: var(--accent-green); }
        .term-err { color: var(--accent-red); }

    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo-box">ST</div>
            <div>
                <h1>Control Center</h1>
                <div class="subtitle">SmartTransit Platform V2 • Live Feed</div>
            </div>
        </div>
        <div class="header-controls">
            <div class="system-status glass">
                <div class="status-dot" id="socket-led"></div>
                <span id="socket-status-text">OFFLINE</span>
            </div>
            <button class="danger" onclick="sendEmergencyAlert()">Emergency Override</button>
        </div>
    </header>

    <div class="workspace">
        <aside class="sidebar">
            <div class="metrics-grid">
                <div class="metric-card glass">
                    <div class="metric-title">Active Vehicles</div>
                    <div class="metric-value cyan" id="m-vehicles">0</div>
                </div>
                <div class="metric-card glass">
                    <div class="metric-title">Live Pasengers</div>
                    <div class="metric-value" id="m-passengers">0</div>
                </div>
                <div class="metric-card glass">
                    <div class="metric-title">Active Routes</div>
                    <div class="metric-value" id="m-routes">0</div>
                </div>
                <div class="metric-card glass">
                    <div class="metric-title">Taxi Requests</div>
                    <div class="metric-value orange" id="m-hails">0</div>
                </div>
            </div>

            <div class="chart-container glass">
                <canvas id="activityChart"></canvas>
            </div>

            <div class="panel glass">
                <div class="panel-header">Server Connection</div>
                <div class="input-group">
                    <input type="text" id="server-url" value="http://192.168.0.182:3000">
                    <button onclick="connectSocket()">Connect</button>
                </div>
                <div class="terminal" id="terminal-out">
                    <div><span class="term-time">[SYSTEM]</span><span class="term-info">Terminal initialized...</span></div>
                </div>
            </div>

            <div class="panel glass">
                <div class="panel-header">Demand Hotspots</div>
                <div class="list-container" id="demand-list"></div>
            </div>

            <div class="panel glass">
                <div class="panel-header">Driver Feedback</div>
                <div class="list-container" id="feedback-list"></div>
            </div>

            <div class="panel glass">
                <div class="panel-header">Route Analytics</div>
                <div class="list-container" id="route-list"></div>
            </div>

            <div class="panel glass" style="flex: 1;">
                <div class="panel-header">Active Fleet Units</div>
                <div class="list-container" id="fleet-list">
                    <!-- Javascript populates this -->
                </div>
            </div>
        </aside>

        <main class="map-section">
            <div class="map-overlay glass">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" id="heatmap-toggle" onchange="toggleHeatmap()" style="accent-color: var(--accent-blue);">
                    Show Demand Heatmap
                </label>
            </div>
            <div id="map"></div>
        </main>
    </div>

    <script type="module">
        // --- UI & State ---
        const ui = {
            btnConnect: document.querySelector('button'),
            inUrl: document.getElementById('server-url'),
            led: document.getElementById('socket-led'),
            statusTxt: document.getElementById('socket-status-text'),
            term: document.getElementById('terminal-out'),
            mVehicles: document.getElementById('m-vehicles'),
            mPassengers: document.getElementById('m-passengers'),
            mRoutes: document.getElementById('m-routes'),
            mHails: document.getElementById('m-hails'),
            fleetList: document.getElementById('fleet-list'),
            demandList: document.getElementById('demand-list'),
            feedbackList: document.getElementById('feedback-list'),
            routeList: document.getElementById('route-list')
        };

        const state = {
            drivers: new Map(),
            passengers: new Map(),
            hailCount: 0,
            hailsByStop: new Map(),
            ratings: new Map(),
            complaints: [],
            chartData: Array(10).fill(0),
            socket: null
        };

        // --- Terminal ---
        function writeLog(msg, type = 'term-info') {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            const div = document.createElement('div');
            div.innerHTML = `<span class="term-time">[${time}]</span><span class="${type}">${msg}</span>`;
            ui.term.appendChild(div);
            ui.term.scrollTop = ui.term.scrollHeight;
        }

        function renderDemand() {
            ui.demandList.innerHTML = '';
            const entries = Array.from(state.hailsByStop.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);
            if (!entries.length) {
                ui.demandList.innerHTML = '<div class="fleet-item">No active hails</div>';
                return;
            }
            entries.forEach(([stop, count]) => {
                const div = document.createElement('div');
                div.className = 'fleet-item';
                div.innerHTML = `<strong>${stop}</strong><span>${count} waiting</span>`;
                ui.demandList.appendChild(div);
            });
        }

        function renderFeedback() {
            ui.feedbackList.innerHTML = '';
            const ratings = Array.from(state.ratings.entries()).slice(-6);
            const complaints = state.complaints.slice(-6);
            if (!ratings.length && !complaints.length) {
                ui.feedbackList.innerHTML = '<div class="fleet-item">No feedback yet</div>';
                return;
            }
            ratings.forEach(([driverId, stats]) => {
                const div = document.createElement('div');
                div.className = 'fleet-item';
                div.innerHTML = `<strong>${driverId}</strong><span>${stats.avg}★ (${stats.count})</span>`;
                ui.feedbackList.appendChild(div);
            });
            complaints.forEach((c) => {
                const div = document.createElement('div');
                div.className = 'fleet-item';
                div.innerHTML = `<strong>${c.driverId}</strong><span>Complaint: ${c.message}</span>`;
                ui.feedbackList.appendChild(div);
            });
        }

        function renderRoutes() {
            ui.routeList.innerHTML = '';
            const counts = {};
            for (const d of state.drivers.values()) {
                if (!d.routeId) continue;
                counts[d.routeId] = (counts[d.routeId] || 0) + 1;
            }
            const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (!entries.length) {
                ui.routeList.innerHTML = '<div class="fleet-item">No active routes</div>';
                return;
            }
            entries.forEach(([routeId, count]) => {
                const div = document.createElement('div');
                div.className = 'fleet-item';
                div.innerHTML = `<strong>${routeId}</strong><span>${count} vehicles</span>`;
                ui.routeList.appendChild(div);
            });
        }

        // --- Chart.js ---
        const ctx = document.getElementById('activityChart').getContext('2d');
        Chart.defaults.color = '#9ca3af';
        Chart.defaults.font.family = "'Inter', sans-serif";
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(10).fill(''),
                datasets: [{
                    label: 'Active Vehicles',
                    data: state.chartData,
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6, 182, 212, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { stepSize: 1 }
                    }
                },
                animation: { duration: 400 }
            }
        });

        setInterval(() => {
            state.chartData.shift();
            state.chartData.push(state.drivers.size);
            chart.update();
        }, 5000);

        // --- Map Setup (CartoDB Dark Matter) ---
        const map = L.map('map', { zoomControl: false }).setView([-24.6282, 25.9231], 13);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const markers = new Map();
        
        // --- Socket Logic ---
        window.connectSocket = () => {
            const url = ui.inUrl.value.trim();
            if (!url) return;
            localStorage.setItem('cc_url', url);

            if (state.socket) state.socket.disconnect();
            writeLog(`Initiating handshake with ${url}...`, 'term-info');
            ui.led.className = 'status-dot';
            ui.statusTxt.innerText = "CONNECTING...";

            state.socket = io(url, {
                extraHeaders: { "bypass-tunnel-reminder": "true" },
                transports: ['polling'],
                upgrade: false,
                timeout: 8000
            });

            state.socket.on("connect", () => {
                writeLog("Uplink established successfully.", "term-success");
                ui.led.className = 'status-dot online';
                ui.statusTxt.innerText = "ONLINE";
                state.socket.emit("join", "dashboard");
                fetch(`${url}/api/state`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.ratings) {
                            Object.entries(data.ratings).forEach(([k, v]) => state.ratings.set(k, v));
                        }
                        if (Array.isArray(data.complaints)) {
                            state.complaints = data.complaints;
                        }
                        if (Array.isArray(data.hails)) {
                            data.hails.forEach(h => {
                                const key = h.stopName || (h.routeId === 'taxi-service' ? 'Taxi Requests' : 'Unknown Stop');
                                state.hailsByStop.set(key, (state.hailsByStop.get(key) || 0) + 1);
                            });
                        }
                        renderDemand();
                        renderFeedback();
                    })
                    .catch(() => {});
            });

            state.socket.on("disconnect", () => {
                writeLog("Uplink severed.", "term-warn");
                ui.led.className = 'status-dot offline';
                ui.statusTxt.innerText = "OFFLINE";
                clearMetrics();
            });

            state.socket.on("connect_error", (err) => {
                writeLog(`Connection error: ${err.message}`, "term-err");
            });

            state.socket.on("fleet-update", (data) => {
                const type = data.type; // 'driver' or 'passenger'
                const id = type === 'driver' ? `D-${data.driverId}` : `P-${data.passengerId}`;
                
                if (type === 'driver') state.drivers.set(id, data);
                else state.passengers.set(id, data);
                
                updateMapMarker(id, type, data);
                scheduleUpdateUI();
            });

            state.socket.on("fleet-remove", (data) => {
                const id = data.type === 'driver' ? `D-${data.id}` : `P-${data.id}`;
                if (markers.has(id)) {
                    map.removeLayer(markers.get(id));
                    markers.delete(id);
                }
                if (data.type === 'driver') state.drivers.delete(id);
                else state.passengers.delete(id);
                scheduleUpdateUI();
            });

            state.socket.on("new-hail", () => { state.hailCount++; scheduleUpdateUI(); writeLog("New Taxi request detected."); });
            state.socket.on("hail-cancelled", () => { if(state.hailCount>0) state.hailCount--; scheduleUpdateUI(); });
            state.socket.on("hail-accepted", (data) => { if(state.hailCount>0) state.hailCount--; scheduleUpdateUI(); writeLog(`Taxi ${data.driverId} accepted hail.`); });
            state.socket.on("new-hail", (data) => { 
                const key = data.stopName || (data.routeId === 'taxi-service' ? 'Taxi Requests' : 'Unknown Stop');
                state.hailsByStop.set(key, (state.hailsByStop.get(key) || 0) + 1);
                renderDemand();
            });
            state.socket.on("hail-cancelled", (data) => { 
                const key = data.stopName || (data.routeId === 'taxi-service' ? 'Taxi Requests' : 'Unknown Stop');
                if (state.hailsByStop.has(key)) state.hailsByStop.set(key, Math.max(0, state.hailsByStop.get(key) - 1));
                renderDemand();
            });
            state.socket.on("hail-expired", (data) => { 
                const key = data.stopName || (data.routeId === 'taxi-service' ? 'Taxi Requests' : 'Unknown Stop');
                if (state.hailsByStop.has(key)) state.hailsByStop.set(key, Math.max(0, state.hailsByStop.get(key) - 1));
                renderDemand();
            });
            state.socket.on("hail-accepted", (data) => { 
                const key = data.stopName || (data.routeId === 'taxi-service' ? 'Taxi Requests' : 'Unknown Stop');
                if (state.hailsByStop.has(key)) state.hailsByStop.set(key, Math.max(0, state.hailsByStop.get(key) - 1));
                renderDemand();
            });
            state.socket.on("boarding", (data) => { writeLog(`Passenger boarded vehicle ${data.driverId}.`); });
            state.socket.on("trip-start", (data) => { writeLog(`Trip started: ${data.driverId}`); });
            state.socket.on("stop-request", (data) => { writeLog(`Stop requested on ${data.routeId} by ${data.passengerId}.`); });
            state.socket.on("hail-expired", (data) => { writeLog(`Hail expired for ${data.passengerId} on ${data.routeId}.`); });
            state.socket.on("driver-rating", (data) => { writeLog(`Driver ${data.driverId} rated ${data.rating}★.`); });
            state.socket.on("driver-complaint", (data) => { writeLog(`Complaint against ${data.driverId}: ${data.message}`); });
            state.socket.on("driver-rating", (data) => { 
                if (data.stats) state.ratings.set(data.driverId, data.stats);
                renderFeedback();
            });
            state.socket.on("driver-complaint", (data) => { 
                state.complaints.push(data);
                renderFeedback();
            });
        };

        // --- Core UI Updates ---
        let updateTimer = null;
        function scheduleUpdateUI() {
            if (updateTimer) return;
            updateTimer = setTimeout(() => {
                updateUI();
                updateTimer = null;
            }, 500); // 500ms debounce
        }

        function updateUI() {
            ui.mVehicles.innerText = state.drivers.size;
            ui.mPassengers.innerText = state.passengers.size;
            ui.mHails.innerText = state.hailCount;

            const routes = new Set();
            state.drivers.forEach(d => { if(d.routeId) routes.add(d.routeId); });
            ui.mRoutes.innerText = routes.size;

            ui.fleetList.innerHTML = '';
            Array.from(state.drivers.values()).slice(0, 50).forEach(d => {
                const isTaxi = d.driverId.toLowerCase().includes('taxi') || d.routeId === 'taxi-service';
                const html = `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-id">${d.driverId}</span>
                            <span class="item-sub">Loc: ${d.coords.lat.toFixed(4)}, ${d.coords.lng.toFixed(4)}</span>
                        </div>
                        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                            <span class="badge ${isTaxi ? 'taxi' : 'combi'}">${isTaxi ? 'TAXI' : d.routeId || 'N/A'}</span>
                            <span class="item-sub">OCC: ${d.occupancy || 'Empty'}</span>
                        </div>
                    </div>
                `;
                ui.fleetList.insertAdjacentHTML('beforeend', html);
            });

            renderRoutes();
        }

        function clearMetrics() {
            state.drivers.clear();
            state.passengers.clear();
            state.hailCount = 0;
            state.hailsByStop.clear();
            state.ratings.clear();
            state.complaints = [];
            markers.forEach(m => map.removeLayer(m));
            markers.clear();
            updateUI();
            renderDemand();
            renderFeedback();
        }

        function updateMapMarker(id, type, data) {
            if (!data.coords || !data.coords.lat) return;
            const latlng = [data.coords.lat, data.coords.lng];

            if (markers.has(id)) {
                markers.get(id).setLatLng(latlng);
            } else {
                let mClass = 'marker-core';
                if (type === 'passenger') mClass += ' passenger';
                else if (data.driverId && data.driverId.toLowerCase().includes('taxi')) mClass += ' taxi';

                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div class="${mClass}"></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const m = L.marker(latlng, { icon }).addTo(map);
                m.bindPopup(`<div style="color: black;"><b>${id}</b><br>${type.toUpperCase()}<br>Route: ${data.routeId || 'N/A'}</div>`);
                markers.set(id, m);
            }
        }

        window.sendEmergencyAlert = () => {
            const msg = prompt("Enter Emergency Broadcast Message:");
            if (msg && state.socket) {
                state.socket.emit("broadcast-alert", { message: msg, timestamp: Date.now() });
                writeLog(`Emergency broadcast sent: ${msg.substring(0, 20)}...`, "term-warn");
            }
        };

        window.toggleHeatmap = () => {
            // Simplified toggle placeholder for real Heatmap layer (leaflet.heat)
            const mapEl = document.getElementById('map');
            if (document.getElementById('heatmap-toggle').checked) {
                mapEl.style.filter = "contrast(1.2) saturate(1.5) hue-rotate(30deg)";
                writeLog("Demand Heatmap overlay enabled.", "term-info");
            } else {
                mapEl.style.filter = "none";
                writeLog("Demand Heatmap overlay disabled.", "term-info");
            }
        };

        // Init
        const saved = localStorage.getItem('cc_url');
        if (saved) ui.inUrl.value = saved;
        connectSocket();

    </script>
</body>
</html>
