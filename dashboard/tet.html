<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTransit | Dashboard Center</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f17;
            --surface: #121827;
            --surface-2: #0f1422;
            --surface-3: #1a2236;
            --text-primary: #f5f7ff;
            --text-secondary: #c7d2fe;
            --text-muted: #94a3b8;
            --accent: #5b8cff;
            --accent-2: #22d3ee;
            --accent-soft: rgba(91, 140, 255, 0.14);
            --danger: #ef4444;
            --success: #22c55e;
            --shadow-sm: 0 8px 16px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 16px 30px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(1200px 700px at 80% -10%, rgba(91, 140, 255, 0.18), transparent 60%),
                radial-gradient(900px 600px at 10% 10%, rgba(34, 211, 238, 0.12), transparent 55%),
                var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: linear-gradient(90deg, rgba(18, 24, 39, 0.96), rgba(15, 20, 34, 0.92));
            border-bottom: 1px solid #1f2937;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 48px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 6px 18px rgba(91, 140, 255, 0.35));
        }

        .header-info h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(18, 24, 39, 0.8);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #1f2937;
            box-shadow: var(--shadow-sm);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        .dot.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Main Workspace */
        .workspace {
            display: grid;
            grid-template-columns: 380px 1fr;
            flex: 1;
            height: calc(100vh - 73px);
            overflow: hidden;
            gap: 16px;
            padding: 16px;
        }

        /* Sidebar Design (No Boxes) */
        .sidebar {
            background: linear-gradient(180deg, var(--surface), var(--surface-2));
            padding: 24px;
            border: 1px solid #1f2937;
            border-radius: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
            box-shadow: var(--shadow-lg);
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        /* Metrics without boxes */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(15, 20, 34, 0.6);
            border: 1px solid #1f2937;
            box-shadow: var(--shadow-sm);
        }

        .metric-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Clean Lists */
        .list-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-row {
            padding: 12px 16px;
            border-radius: 14px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 20, 34, 0.6);
            border: 1px solid #1f2937;
        }

        .item-row:hover {
            background: rgba(91, 140, 255, 0.14);
            transform: translateX(4px);
        }

        .item-meta b {
            font-size: 0.85rem;
            display: block;
        }

        .item-meta span {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .badge-pill {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 800;
            background: rgba(91, 140, 255, 0.15);
            color: var(--text-primary);
            border: 1px solid rgba(91, 140, 255, 0.4);
        }

        /* Map Section */
        .map-container {
            position: relative;
            background: var(--surface-2);
            border: 1px solid #1f2937;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-filters {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: rgba(15, 20, 34, 0.85);
            border: 1px solid #1f2937;
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-chip select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-weight: 700;
            outline: none;
        }

        .map-floating-controls {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .floating-card {
            background: rgba(15, 20, 34, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid #1f2937;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Premium Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #3b5bff, #4dd6ff);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(91, 140, 255, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        input[type="text"] {
            border: 1px solid #1f2937;
            background: rgba(15, 20, 34, 0.8);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            font-size: 0.85rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        /* Emergency Action */
        .emergency-btn {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border: 1.5px solid var(--danger);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .emergency-btn:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="brand-container">
            <img src="Gemini_Generated_Image_pptoivpptoivppto.png" alt="SmartTransit Logo" size="100px"
                class="logo-img">
            <div class="header-info">
                <h1>Command Center</h1>
                <p id="live-clock">00:00:00</p>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="status-pill">
                <div class="dot" id="socket-led"></div>
                <span id="socket-status-text">OFFLINE</span>
            </div>
            <button class="emergency-btn" onclick="sendEmergencyAlert()">EMERGENCY ALERT</button>
        </div>
    </header>

    <div class="workspace">
        <aside class="sidebar">
            <section>
                <div class="section-label">Real-time Capacity</div>
                <div class="metrics-grid">
                    <div class="metric-item">
                        <span class="metric-val" id="m-vehicles" style="color: var(--accent);">0</span>
                        <span class="metric-label">Active Fleet</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-val" id="m-passengers" style="color: var(--success);">0</span>
                        <span class="metric-label">Live Riders</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-val" id="m-routes">0</span>
                        <span class="metric-label">Routes</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-val" id="m-hails" style="color: #f59e0b;">0</span>
                        <span class="metric-label">Hails</span>
                    </div>
                </div>
            </section>

            <section>
                <div class="section-label">Fleet Distribution</div>
                <div style="height: 140px;">
                    <canvas id="activityChart"></canvas>
                </div>
            </section>

            <section>
                <div class="section-label">Connection Management</div>
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <input type="text" id="server-url" value="http://192.168.0.182:3000">
                    <button class="btn-primary" onclick="connectSocket()">Link</button>
                </div>
            </section>

            <section style="flex: 1;">
                <div class="section-label">
                    Live Fleet Log
                    <span id="fleet-count" style="color: var(--accent);">0</span>
                </div>
                <div class="list-stack" id="fleet-list">
                </div>
            </section>
        </aside>

        <main class="map-container">
            <div class="map-filters">
                <label class="filter-chip">
                    <input type="checkbox" id="show-drivers" checked style="width:14px;height:14px;">
                    Drivers
                </label>
                <label class="filter-chip">
                    <input type="checkbox" id="show-passengers" checked style="width:14px;height:14px;">
                    Passengers
                </label>
                <label class="filter-chip">
                    Type
                    <select id="filter-type">
                        <option value="ALL">All</option>
                        <option value="BUS">Bus</option>
                        <option value="COMBI">Combi</option>
                        <option value="TAXI">Taxi</option>
                    </select>
                </label>
            </div>
            <div class="map-floating-controls">
                <div class="floating-card">
                    <input type="checkbox" id="heatmap-toggle" onchange="toggleHeatmap()"
                        style="width: 18px; height: 18px;">
                    <label for="heatmap-toggle">Demand Overlay</label>
                </div>
                <div class="floating-card" style="color: var(--accent);">
                    <span id="map-stat-drivers">0 Fleet Units</span>
                </div>
            </div>
            <div id="map"></div>
        </main>
    </div>

    <script type="module">
        // Shared Logic from your original file, updated for the new UI IDs
        setInterval(() => {
            document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        // Core State
        const state = {
            drivers: new Map(),
            passengers: new Map(),
            socket: null,
            chartData: Array(15).fill(0),
        };
        const markers = new Map();
        const filters = { showDrivers: true, showPassengers: true, type: 'ALL' };

        // Initialize Map with Light Style
        const map = L.map('map', { zoomControl: false }).setView([-24.6282, 25.9231], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©CARTO'
        }).addTo(map);

        function updateMapMarker(item, type) {
            if (!item || !item.coords) return;
            const id = (type === 'driver' ? item.driverId : item.passengerId) || 'unknown';
            const latlng = [item.coords.lat, item.coords.lng];
            const routeLabel = item.routeId || 'Unassigned';
            const occupancy = item.occupancy || '?';
            const title = type === 'driver' ? `Driver ${id}` : `Passenger ${id}`;
            const popupHtml = type === 'driver'
                ? `<div style="font-family:'Space Grotesk', sans-serif; color:#0f172a;"><b>${title}</b><br>Route: ${routeLabel}<br>Occupancy: ${occupancy}</div>`
                : `<div style="font-family:'Space Grotesk', sans-serif; color:#0f172a;"><b>${title}</b><br>Route: ${routeLabel}</div>`;
            if (markers.has(id)) {
                markers.get(id).setLatLng(latlng).setPopupContent(popupHtml);
            } else {
                const m = L.circleMarker(latlng, {
                    radius: type === 'driver' ? 7 : 5,
                    color: type === 'driver' ? '#5B8CFF' : '#22C55E',
                    weight: 2,
                    fillColor: type === 'driver' ? '#5B8CFF' : '#22C55E',
                    fillOpacity: 0.8
                }).addTo(map);
                m.bindPopup(popupHtml);
                markers.set(id, m);
            }
        }

        function rebuildMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers.clear();
            if (filters.showDrivers) {
                Array.from(state.drivers.values()).forEach(d => {
                    const isTaxi = d.routeId === 'taxi-service';
                    const isBus = d.routeId?.startsWith('bus-');
                    const type = isTaxi ? 'TAXI' : isBus ? 'BUS' : 'COMBI';
                    if (filters.type !== 'ALL' && filters.type !== type) return;
                    updateMapMarker(d, 'driver');
                });
            }
            if (filters.showPassengers) {
                Array.from(state.passengers.values()).forEach(p => updateMapMarker(p, 'passenger'));
            }
        }

        // Standard Socket Connection Logic (Simplified for brevity)
        window.connectSocket = () => {
            const url = document.getElementById('server-url').value;
            const led = document.getElementById('socket-led');
            const statusText = document.getElementById('socket-status-text');

            if (state.socket) state.socket.disconnect();

            state.socket = io(url, { transports: ['polling'] });

            state.socket.on("connect", () => {
                led.className = "dot online";
                statusText.innerText = "SYSTEM SECURED";
                state.socket.emit("join", "dashboard");
            });

            state.socket.on("fleet-update", (data) => {
                if (data.type === 'driver') state.drivers.set(data.driverId, data);
                if (data.type === 'passenger') state.passengers.set(data.passengerId, data);
                rebuildMarkers();
                updateUI();
            });
            state.socket.on("fleet-remove", (data) => {
                if (data.type === 'driver') {
                    const id = data.id;
                    if (markers.has(id)) { map.removeLayer(markers.get(id)); markers.delete(id); }
                    state.drivers.delete(id);
                    updateUI();
                }
            });
        };

        function updateUI() {
            document.getElementById('m-vehicles').innerText = state.drivers.size;
            document.getElementById('m-passengers').innerText = state.passengers.size;
            document.getElementById('map-stat-drivers').innerText = `${state.drivers.size} Fleet Units`;

            const list = document.getElementById('fleet-list');
            list.innerHTML = '';

            Array.from(state.drivers.values()).slice(0, 8).forEach(d => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-meta">
                        <b>Driver ${d.driverId}</b>
                        <span>${d.routeId || 'Unassigned'}</span>
                    </div>
                    <span class="badge-pill">${d.occupancy || 0} PAX</span>
                `;
                list.appendChild(row);
            });
            Array.from(state.passengers.values()).slice(0, 6).forEach(p => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-meta">
                        <b>Passenger ${p.passengerId}</b>
                        <span>${p.routeId || 'Unassigned'}</span>
                    </div>
                    <span class="badge-pill">WAITING</span>
                `;
                list.appendChild(row);
            });
        }

        // Chart Initialization (Matching the Light Theme)
        const ctx = document.getElementById('activityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(15).fill(''),
                datasets: [{
                    data: state.chartData,
                    borderColor: '#5B8CFF',
                    backgroundColor: 'rgba(91, 140, 255, 0.12)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { display: false }
                }
            }
        });

        connectSocket();
    </script>
</body>

</html>
